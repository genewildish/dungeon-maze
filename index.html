<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f23;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      color: #cccccc;
    }
    #wrapper {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    #game-container {
      position: relative;
    }
    #scoreboard {
      width: 80px;
      text-align: center;
      padding-top: 0.5rem;
    }
    #scoreboard h3 {
      color: #ff6b9d;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      letter-spacing: 0.1em;
    }
    #reset-total {
      font-size: 2rem;
      color: #ffdd57;
      font-weight: bold;
    }
    #scoreboard .hint {
      font-size: 0.6rem;
      color: #666;
      margin-top: 0.25rem;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 600px;
      height: 600px;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(15, 15, 35, 0.9);
    }
    .overlay.hidden { display: none; }
    .overlay h1 {
      font-size: 2rem;
      color: #ffdd57;
      margin-bottom: 1rem;
      text-shadow: 2px 2px #000;
    }
    .overlay button {
      font-family: monospace;
      font-size: 1rem;
      padding: 0.5rem 1.5rem;
      margin: 0.25rem;
      background: #2a2a4a;
      color: #ffdd57;
      border: 2px solid #ffdd57;
      cursor: pointer;
    }
    .overlay button:hover {
      background: #ffdd57;
      color: #0f0f23;
    }
    .toggle-group {
      margin: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toggle-group label {
      cursor: pointer;
      font-size: 0.9rem;
    }
    .toggle-group input[type="checkbox"] {
      accent-color: #ffdd57;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    #help-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-family: monospace;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: #2a2a4a;
      color: #888;
      border: 1px solid #444;
      cursor: pointer;
    }
    #help-btn:hover { color: #ffdd57; border-color: #ffdd57; }
    #help-btn.hidden { display: none; }
    .exit-hint {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.05em;
      font-style: italic;
    }
    /* Mobile D-Pad (touch controls on phones/tablets) */
    #mobile-dpad {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      align-items: center;
      z-index: 10;
    }
    #mobile-dpad.hidden { display: none; }
    .dpad-btn {
      width: 3rem;
      height: 3rem;
      font-size: 1.5rem;
      background: rgba(42, 42, 74, 0.85);
      color: #ffdd57;
      border: 2px solid #ffdd57;
      border-radius: 0.25rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .dpad-btn:active {
      background: #ffdd57;
      color: #0f0f23;
    }
    .dpad-row {
      display: flex;
      gap: 0.25rem;
    }
  </style>
</head>
<body>
  <div id="wrapper">
  <div id="game-container">
    <canvas id="maze" width="200" height="200"></canvas>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
      <h1>MAZE</h1>
      <div class="toggle-group">
        <input type="checkbox" id="trail-toggle" checked>
        <label for="trail-toggle">Show Trail</label>
      </div>
      <div class="toggle-group">
        <input type="checkbox" id="checkpoint-toggle" checked>
        <label for="checkpoint-toggle">Checkpoints</label>
      </div>
      <div class="toggle-group">
        <input type="checkbox" id="lamplight-toggle">
        <label for="lamplight-toggle">Lamplight</label>
      </div>
      <button id="start-btn">START</button>
      <div class="exit-hint">press escape to escape</div>
    </div>


    <!-- Win Screen -->
    <div id="win-screen" class="overlay hidden">
      <h1>YOU WIN!</h1>
      <button id="play-again-btn">Play Again</button>
    </div>

    <!-- Help Button (during gameplay) -->
    <button id="help-btn" class="hidden">HELP</button>

    <!-- Mobile D-Pad (touch controls, shown only on touch devices) -->
    <div id="mobile-dpad" class="hidden">
      <button id="dpad-up" class="dpad-btn" data-dir="n">▲</button>
      <div class="dpad-row">
        <button id="dpad-left" class="dpad-btn" data-dir="w">◀</button>
        <button id="dpad-down" class="dpad-btn" data-dir="s">▼</button>
        <button id="dpad-right" class="dpad-btn" data-dir="e">▶</button>
      </div>
    </div>
  </div>
  <div id="scoreboard">
    <h3>RESETS</h3>
    <div id="reset-total">0</div>
    <div class="hint">lower is better</div>
  </div>
  </div><!-- /wrapper -->

  <script>
    // === CONSTANTS & STATE ===
    const COLS = 25;
    const ROWS = 25;
    const CELL = 8; // pixels per cell

    const COLORS = {
      bg: '#0f0f23',
      wall: '#4a6741',
      wallHighlight: '#7ec875',
      corridor: '#1a1a2e',
      player: '#ffdd57',
      trail: '#2a4a3a',
      checkpoint: '#ff6b9d',
      sparkle: ['#ffdd57', '#ff6b9d', '#7ec875', '#57c7ff', '#ffffff']
    };

    const canvas = document.getElementById('maze');
    const ctx = canvas.getContext('2d');

    // Detect ClockworkPi (or any embedded target) via ?platform=clockworkpi URL param.
    // When running on-device, scale the canvas to fill the viewport so the game
    // uses the full screen rather than sitting in the center of a desktop browser.
    const isClockworkPi = new URLSearchParams(window.location.search).get('platform') === 'clockworkpi';
    if (isClockworkPi) {
      // Leave 120px for the scoreboard sidebar + gap; 20px vertical breathing room.
      const size = Math.min(window.innerHeight - 20, window.innerWidth - 120);
      canvas.style.width  = size + 'px';
      canvas.style.height = size + 'px';
    }

    let gameState = 'start'; // start | playing | win
    let grid = [];
    let solutionPath = [];
    let entrance = { x: 0, y: 0, wall: 'w' };
    let exitCell = { x: 0, y: 0, wall: 'e' };
    let player = { x: 0, y: 0, lastCheckpointIndex: 0, trail: [], visitedSet: new Set() };
    let particles = [];
    let checkpointResets = new Map(); // "x,y" -> count of resets at that cell
    let trailEnabled = true;
    let checkpointEnabled = true;
    let lamplightEnabled = false;
    let monsters = [];
    let fairies = [];
    let fairyRevealTimer = 0; // seconds remaining of full-map illumination

    // === GRID & MAZE GENERATION ===

    function createGrid() {
      grid = [];
      for (let y = 0; y < ROWS; y++) {
        grid[y] = [];
        for (let x = 0; x < COLS; x++) {
          grid[y][x] = {
            walls: { n: true, s: true, e: true, w: true },
            visited: false
          };
        }
      }
    }

    function removeWall(x1, y1, x2, y2) {
      if (x2 === x1 + 1) { grid[y1][x1].walls.e = false; grid[y2][x2].walls.w = false; }
      if (x2 === x1 - 1) { grid[y1][x1].walls.w = false; grid[y2][x2].walls.e = false; }
      if (y2 === y1 + 1) { grid[y1][x1].walls.s = false; grid[y2][x2].walls.n = false; }
      if (y2 === y1 - 1) { grid[y1][x1].walls.n = false; grid[y2][x2].walls.s = false; }
    }

    function getNeighbors(x, y, onlyUnvisited) {
      const neighbors = [];
      if (y > 0 && (!onlyUnvisited || !grid[y - 1][x].visited)) neighbors.push([x, y - 1, 'n']);
      if (y < ROWS - 1 && (!onlyUnvisited || !grid[y + 1][x].visited)) neighbors.push([x, y + 1, 's']);
      if (x > 0 && (!onlyUnvisited || !grid[y][x - 1].visited)) neighbors.push([x - 1, y, 'w']);
      if (x < COLS - 1 && (!onlyUnvisited || !grid[y][x + 1].visited)) neighbors.push([x + 1, y, 'e']);
      return neighbors;
    }

    function randomEdgeCell() {
      // Pick a random cell on any edge of the grid and return
      // which border wall should be opened for entry/exit
      const edge = Math.floor(Math.random() * 4);
      switch (edge) {
        case 0: return { x: Math.floor(Math.random() * COLS), y: 0, wall: 'n' };
        case 1: return { x: Math.floor(Math.random() * COLS), y: ROWS - 1, wall: 's' };
        case 2: return { x: 0, y: Math.floor(Math.random() * ROWS), wall: 'w' };
        case 3: return { x: COLS - 1, y: Math.floor(Math.random() * ROWS), wall: 'e' };
      }
    }

    function generateSolutionPath() {
      solutionPath = [];

      // Pick random entrance and exit on any edge, at least 1 cell apart
      entrance = randomEdgeCell();
      do {
        exitCell = randomEdgeCell();
      } while (exitCell.x === entrance.x && exitCell.y === entrance.y);

      let x = entrance.x, y = entrance.y;
      grid[y][x].visited = true;
      solutionPath.push([x, y]);

      // Open entrance border wall
      grid[y][x].walls[entrance.wall] = false;

      while (!(x === exitCell.x && y === exitCell.y)) {
        const neighbors = getNeighbors(x, y, true); // only unvisited
        if (neighbors.length === 0) {
          // Backtrack along path to find cell with unvisited neighbors
          solutionPath.pop();
          if (solutionPath.length === 0) break; // shouldn't happen on 25x25
          const prev = solutionPath[solutionPath.length - 1];
          x = prev[0];
          y = prev[1];
          continue;
        }

        // Dynamic bias toward the exit: 40% weight toward the direction
        // that reduces the largest remaining axis distance, 20% for others.
        // The bias axis is chosen proportionally so diagonal paths don't oscillate.
        const dx = exitCell.x - x;
        const dy = exitCell.y - y;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        let biasDir;
        if (absDx + absDy === 0) {
          biasDir = null; // at exit — shouldn't happen in the loop
        } else if (Math.random() < absDx / (absDx + absDy)) {
          biasDir = dx > 0 ? 'e' : 'w';
        } else {
          biasDir = dy > 0 ? 's' : 'n';
        }

        const weighted = [];
        for (const [nx, ny, dir] of neighbors) {
          const weight = dir === biasDir ? 40 : 20;
          for (let i = 0; i < weight; i++) weighted.push([nx, ny]);
        }
        const [nx, ny] = weighted[Math.floor(Math.random() * weighted.length)];

        removeWall(x, y, nx, ny);
        grid[ny][nx].visited = true;
        solutionPath.push([nx, ny]);
        x = nx;
        y = ny;
      }

      // Open exit border wall
      grid[exitCell.y][exitCell.x].walls[exitCell.wall] = false;
    }

    function fillMaze() {
      // Phase 2: carve corridors branching from the solution path.
      // By starting DFS from solution path cells (shuffled for variety),
      // every corridor connects back to the solution — creating reachable
      // alternate routes of naturally varied length. DFS goes deep before
      // backtracking, so some branches become long, convincing detours.

      // Collect solution path cells that have unvisited neighbors
      const frontier = [];
      for (const [sx, sy] of solutionPath) {
        if (getNeighbors(sx, sy, true).length > 0) {
          frontier.push([sx, sy]);
        }
      }

      // Shuffle so branch lengths vary naturally — the first frontier cells
      // processed get the most unvisited territory to carve through
      for (let i = frontier.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [frontier[i], frontier[j]] = [frontier[j], frontier[i]];
      }

      // Carve from each frontier cell into unvisited territory
      for (const [fx, fy] of frontier) {
        if (getNeighbors(fx, fy, true).length > 0) {
          carve(fx, fy);
        }
      }

      // Catch any remaining unvisited cells not reachable from the frontier
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (!grid[y][x].visited) {
            carve(x, y);
          }
        }
      }
    }

    function carve(startX, startY) {
      const stack = [[startX, startY]];
      grid[startY][startX].visited = true;

      while (stack.length > 0) {
        const [cx, cy] = stack[stack.length - 1];
        const neighbors = getNeighbors(cx, cy, true);

        if (neighbors.length === 0) {
          stack.pop();
          continue;
        }

        const [nx, ny] = neighbors[Math.floor(Math.random() * neighbors.length)];
        removeWall(cx, cy, nx, ny);
        grid[ny][nx].visited = true;
        stack.push([nx, ny]);
      }
    }

    function generateMaze() {
      // Minimum solution path length = distance between opposing corners.
      // Regenerate if the path is too short (e.g. entrance/exit too close).
      const minPathLength = (COLS - 1) + (ROWS - 1);
      do {
        createGrid();
        generateSolutionPath();
      } while (solutionPath.length < minPathLength);
      fillMaze();

      // In lamplight mode, punch random holes in walls to create shortcuts
      // that help the player evade monsters. Number of holes = 1/4 the
      // corner-to-corner Manhattan distance that sets the min path length.
      if (lamplightEnabled) {
        const holeCount = Math.floor(minPathLength / 4);
        for (let i = 0; i < holeCount; i++) {
          const x = Math.floor(Math.random() * COLS);
          const y = Math.floor(Math.random() * ROWS);
          const cell = grid[y][x];
          // Collect walls that can be removed (must have a neighbor on the other side)
          const candidates = [];
          if (cell.walls.n && y > 0) candidates.push([x, y, x, y - 1]);
          if (cell.walls.s && y < ROWS - 1) candidates.push([x, y, x, y + 1]);
          if (cell.walls.w && x > 0) candidates.push([x, y, x - 1, y]);
          if (cell.walls.e && x < COLS - 1) candidates.push([x, y, x + 1, y]);
          if (candidates.length > 0) {
            const [x1, y1, x2, y2] = candidates[Math.floor(Math.random() * candidates.length)];
            removeWall(x1, y1, x2, y2);
          }
        }
      }
    }

    // === RENDERING ===

    function render() {
      ctx.fillStyle = COLORS.corridor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (lamplightEnabled) {
        drawLamplight();
        // Fairy reveal: briefly show all walls, fading out
        if (fairyRevealTimer > 0) {
          ctx.strokeStyle = 'rgba(100, 255, 100, ' + Math.min(1, fairyRevealTimer) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath();
          for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
              const px = x * CELL;
              const py = y * CELL;
              const cell = grid[y][x];
              if (cell.walls.n) { ctx.moveTo(px, py + 0.5); ctx.lineTo(px + CELL, py + 0.5); }
              if (cell.walls.s) { ctx.moveTo(px, py + CELL - 0.5); ctx.lineTo(px + CELL, py + CELL - 0.5); }
              if (cell.walls.w) { ctx.moveTo(px + 0.5, py); ctx.lineTo(px + 0.5, py + CELL); }
              if (cell.walls.e) { ctx.moveTo(px + CELL - 0.5, py); ctx.lineTo(px + CELL - 0.5, py + CELL); }
            }
          }
          ctx.stroke();
        }
      } else {
        drawMaze();
      }
      drawTrail();
      drawResetCounts();
      drawPlayer();
      drawMonsters();
      drawFairies();
      drawParticles();
    }

    function drawMaze() {
      ctx.strokeStyle = COLORS.wall;
      ctx.lineWidth = 1;

      ctx.beginPath();
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const px = x * CELL;
          const py = y * CELL;
          const cell = grid[y][x];

          if (cell.walls.n) { ctx.moveTo(px, py + 0.5); ctx.lineTo(px + CELL, py + 0.5); }
          if (cell.walls.s) { ctx.moveTo(px, py + CELL - 0.5); ctx.lineTo(px + CELL, py + CELL - 0.5); }
          if (cell.walls.w) { ctx.moveTo(px + 0.5, py); ctx.lineTo(px + 0.5, py + CELL); }
          if (cell.walls.e) { ctx.moveTo(px + CELL - 0.5, py); ctx.lineTo(px + CELL - 0.5, py + CELL); }
        }
      }
      ctx.stroke();

      drawPortals();
    }

    function drawLamplight() {
      if (gameState !== 'playing') return;

      // How many trail cells behind the player still show wall reflections
      const FADE_LENGTH = 20;

      // Draw fading walls around recent trail cells — amber glow like lamplight.
      // Most recent cells are brightest; older ones fade to invisible.
      const trailLen = player.trail.length;
      const start = Math.max(0, trailLen - FADE_LENGTH);
      for (let i = start; i < trailLen; i++) {
        const stepsAgo = trailLen - i;
        const alpha = 1.0 - (stepsAgo / FADE_LENGTH);
        drawCellWalls(player.trail[i][0], player.trail[i][1], alpha);
      }

      // Glow radius around the player — walls fade with Manhattan distance
      const GLOW_RADIUS = 3;
      for (let dy = -GLOW_RADIUS; dy <= GLOW_RADIUS; dy++) {
        for (let dx = -GLOW_RADIUS; dx <= GLOW_RADIUS; dx++) {
          const gx = player.x + dx;
          const gy = player.y + dy;
          if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) continue;
          const dist = Math.abs(dx) + Math.abs(dy);
          if (dist > GLOW_RADIUS) continue;
          const alpha = 1.0 - (dist / (GLOW_RADIUS + 1));
          drawCellWalls(gx, gy, alpha);
        }
      }

      drawPortals();
    }

    function drawPortals() {
      if (solutionPath.length === 0) return;

      // Entrance: steady highlight
      ctx.fillStyle = COLORS.wallHighlight;
      drawPortalMark(entrance);

      // Exit: gentle undulating glow that beckons the player (alpha 0.3–1.0)
      const t = performance.now() / 1000;
      const exitAlpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * 2.0));
      ctx.fillStyle = 'rgba(126, 200, 117, ' + exitAlpha + ')';
      drawPortalMark(exitCell);
    }

    function drawPortalMark(portal) {
      if (portal.wall === 'n') ctx.fillRect(portal.x * CELL + 1, 0, CELL - 2, 2);
      if (portal.wall === 's') ctx.fillRect(portal.x * CELL + 1, ROWS * CELL - 2, CELL - 2, 2);
      if (portal.wall === 'w') ctx.fillRect(0, portal.y * CELL + 1, 2, CELL - 2);
      if (portal.wall === 'e') ctx.fillRect(COLS * CELL - 2, portal.y * CELL + 1, 2, CELL - 2);
    }

    function drawCellWalls(x, y, alpha) {
      const px = x * CELL;
      const py = y * CELL;
      const cell = grid[y][x];
      ctx.strokeStyle = 'rgba(255, 170, 68, ' + alpha + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      if (cell.walls.n) { ctx.moveTo(px, py + 0.5); ctx.lineTo(px + CELL, py + 0.5); }
      if (cell.walls.s) { ctx.moveTo(px, py + CELL - 0.5); ctx.lineTo(px + CELL, py + CELL - 0.5); }
      if (cell.walls.w) { ctx.moveTo(px + 0.5, py); ctx.lineTo(px + 0.5, py + CELL); }
      if (cell.walls.e) { ctx.moveTo(px + CELL - 0.5, py); ctx.lineTo(px + CELL - 0.5, py + CELL); }
      ctx.stroke();
    }

    function drawPlayer() {
      if (gameState !== 'playing') return;
      const px = player.x * CELL + 2;
      const py = player.y * CELL + 2;
      // Glow effect
      ctx.fillStyle = 'rgba(255, 221, 87, 0.3)';
      ctx.fillRect(px - 1, py - 1, CELL - 2, CELL - 2);
      // Player
      ctx.fillStyle = COLORS.player;
      ctx.fillRect(px, py, CELL - 4, CELL - 4);
    }

    function drawTrail() {
      if (!trailEnabled || gameState !== 'playing') return;
      ctx.fillStyle = COLORS.trail;
      for (const [tx, ty] of player.trail) {
        ctx.fillRect(tx * CELL + 1, ty * CELL + 1, CELL - 2, CELL - 2);
      }
    }

    function drawResetCounts() {
      if (gameState !== 'playing' || checkpointResets.size === 0) return;
      // Draw reset count numbers centered in each checkpoint cell
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const [key, count] of checkpointResets) {
        const [cx, cy] = key.split(',').map(Number);
        // Background pip so the number is readable over the trail
        ctx.fillStyle = 'rgba(255, 107, 157, 0.6)';
        ctx.fillRect(cx * CELL + 1, cy * CELL + 1, CELL - 2, CELL - 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillText(count, cx * CELL + CELL / 2, cy * CELL + CELL / 2 + 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
      }
      ctx.globalAlpha = 1;
    }

    // === PLAYER & INPUT ===

    function canMove(x, y, dir) {
      // Block moving back out the entrance
      if (x === entrance.x && y === entrance.y && dir === entrance.wall) return false;
      // Block moving off any grid edge (exit handled separately in movePlayer)
      if (dir === 'n') return !grid[y][x].walls.n && y > 0;
      if (dir === 's') return !grid[y][x].walls.s && y < ROWS - 1;
      if (dir === 'w') return !grid[y][x].walls.w && x > 0;
      if (dir === 'e') return !grid[y][x].walls.e && x < COLS - 1;
      return false;
    }

    function movePlayer(dir) {
      if (gameState !== 'playing') return;

      // Check for exit before normal movement — win when stepping through exit wall
      if (player.x === exitCell.x && player.y === exitCell.y && dir === exitCell.wall) {
        winGame();
        return;
      }

      if (!canMove(player.x, player.y, dir)) return;

      const dx = dir === 'e' ? 1 : dir === 'w' ? -1 : 0;
      const dy = dir === 's' ? 1 : dir === 'n' ? -1 : 0;
      const nx = player.x + dx;
      const ny = player.y + dy;

      player.visitedSet.add(player.x + ',' + player.y);
      player.trail.push([player.x, player.y]);
      player.x = nx;
      player.y = ny;
      player.visitedSet.add(nx + ',' + ny);

      // Spawn movement sparkles
      spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, 3, 'move');

      // Update checkpoint
      updateCheckpoint();

      // Check if player walked into a fairy
      if (lamplightEnabled) {
        for (let i = fairies.length - 1; i >= 0; i--) {
          if (fairies[i].x === player.x && fairies[i].y === player.y) {
            fairyRevealTimer = 1.5;
            spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, 12, 'win');
            fairies.splice(i, 1);
          }
        }
      }

      // Check if player walked into a monster
      if (lamplightEnabled && monsters.some(m => m.x === player.x && m.y === player.y)) {
        monsterCaughtPlayer();
        return;
      }

      // Auto-resume from checkpoint at structural dead ends (3 walls)
      if (isStructuralDeadEnd()) {
        resumeFromCheckpoint();
      }

      render();
    }

    document.addEventListener('keydown', (e) => {
      // Escape exits the game (back to desktop)
      if (e.key === 'Escape') {
        window.close(); // Works in kiosk mode on most systems
        return;
      }
      // Enter/Space advance through start and win screens (works with D-pad center button)
      if (e.key === 'Enter' || e.key === ' ') {
        if (gameState === 'start') { startGame(); return; }
        if (gameState === 'win')   { playAgain(); return; }
      }
      const keyMap = {
        ArrowUp: 'n', ArrowDown: 's', ArrowLeft: 'w', ArrowRight: 'e',
        w: 'n', s: 's', a: 'w', d: 'e'
      };
      const dir = keyMap[e.key];
      if (dir) {
        e.preventDefault();
        movePlayer(dir);
      }
    });

    // === CHECKPOINT ===

    function buildSolutionSet() {
      // Map from "x,y" -> index in solutionPath for O(1) lookup
      player.solutionMap = new Map();
      for (let i = 0; i < solutionPath.length; i++) {
        const key = solutionPath[i][0] + ',' + solutionPath[i][1];
        // Only store the first occurrence (path is self-avoiding, so each cell appears once)
        if (!player.solutionMap.has(key)) {
          player.solutionMap.set(key, i);
        }
      }
    }

    function updateCheckpoint() {
      if (!checkpointEnabled) return;
      const key = player.x + ',' + player.y;
      if (player.solutionMap.has(key)) {
        const idx = player.solutionMap.get(key);
        if (idx >= player.lastCheckpointIndex) {
          player.lastCheckpointIndex = idx;
        }
      }
    }

    // === DEAD END ===

    function isStructuralDeadEnd() {
      // Structural dead end: cell has 3 walls (only 1 passage out) and
      // the player has already visited the only reachable neighbor.
      const cell = grid[player.y][player.x];
      const wallCount = [cell.walls.n, cell.walls.s, cell.walls.e, cell.walls.w].filter(Boolean).length;
      if (wallCount < 3) return false;
      const directions = [
        ['n', 0, -1], ['s', 0, 1], ['w', -1, 0], ['e', 1, 0]
      ];
      for (const [dir, dx, dy] of directions) {
        if (canMove(player.x, player.y, dir)) {
          const key = (player.x + dx) + ',' + (player.y + dy);
          if (!player.visitedSet.has(key)) return false;
        }
      }
      return true;
    }

    function resumeFromCheckpoint() {
      if (!checkpointEnabled) return;
      const cp = solutionPath[player.lastCheckpointIndex];
      player.x = cp[0];
      player.y = cp[1];

      // Track how many times we've reset at this checkpoint
      const resetKey = cp[0] + ',' + cp[1];
      checkpointResets.set(resetKey, (checkpointResets.get(resetKey) || 0) + 1);
      updateScoreboard();

      // Clear trail from checkpoint onward: find the LAST occurrence of the
      // checkpoint cell in the trail (player may have passed through it multiple times)
      const cpKey = cp[0] + ',' + cp[1];
      let cpTrailIdx = -1;
      for (let i = player.trail.length - 1; i >= 0; i--) {
        if (player.trail[i][0] + ',' + player.trail[i][1] === cpKey) {
          cpTrailIdx = i;
          break;
        }
      }
      if (cpTrailIdx >= 0) {
        player.trail = player.trail.slice(0, cpTrailIdx + 1);
      } else {
        player.trail = [];
      }
      // Rebuild visitedSet from trimmed trail
      player.visitedSet = new Set(player.trail.map(t => t[0] + ',' + t[1]));
      player.visitedSet.add(player.x + ',' + player.y);

      spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, 10, 'teleport');
      render();
    }

    function updateScoreboard() {
      let total = 0;
      for (const count of checkpointResets.values()) total += count;
      document.getElementById('reset-total').textContent = total;
    }

    // Wire up buttons
    document.getElementById('help-btn').addEventListener('click', () => {
      if (gameState === 'playing') resumeFromCheckpoint();
    });

    // === PARTICLE SYSTEM ===

    function spawnParticles(cx, cy, count, type) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = type === 'win' ? (1 + Math.random() * 3) : (0.5 + Math.random() * 1.5);
        particles.push({
          x: cx,
          y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          color: COLORS.sparkle[Math.floor(Math.random() * COLORS.sparkle.length)],
          size: type === 'win' ? (1 + Math.random() * 2) : (0.5 + Math.random())
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt * 1.5;
        p.vx *= 0.98;
        p.vy *= 0.98;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // === MONSTERS (Lamplight mode only) ===

    function spawnMonsters() {
      monsters = [];
      if (!lamplightEnabled) return;
      for (let i = 0; i < 3; i++) {
        let mx, my;
        // Spawn away from the player (at least 8 cells Manhattan distance)
        do {
          mx = Math.floor(Math.random() * COLS);
          my = Math.floor(Math.random() * ROWS);
        } while (Math.abs(mx - player.x) + Math.abs(my - player.y) < 8);
        monsters.push({ x: mx, y: my, moveTimer: 0 });
      }
    }

    function updateMonsters(dt) {
      if (!lamplightEnabled || gameState !== 'playing') return;

      for (const m of monsters) {
        m.moveTimer += dt;
        // Monsters move every 0.4 seconds — fast enough to feel alive,
        // slow enough that the player can react
        if (m.moveTimer < 0.4) continue;
        m.moveTimer = 0;

        // Collect passable directions from the monster's current cell
        const dirs = [];
        const cell = grid[m.y][m.x];
        if (!cell.walls.n && m.y > 0) dirs.push([0, -1]);
        if (!cell.walls.s && m.y < ROWS - 1) dirs.push([0, 1]);
        if (!cell.walls.w && m.x > 0) dirs.push([-1, 0]);
        if (!cell.walls.e && m.x < COLS - 1) dirs.push([1, 0]);

        if (dirs.length > 0) {
          const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];
          m.x += dx;
          m.y += dy;
        }

        // Check collision with player
        if (m.x === player.x && m.y === player.y) {
          monsterCaughtPlayer();
          return;
        }
      }
    }

    function monsterCaughtPlayer() {
      // Reset player to the beginning
      player.x = solutionPath[0][0];
      player.y = solutionPath[0][1];
      player.trail = [];
      player.visitedSet = new Set([player.x + ',' + player.y]);
      player.lastCheckpointIndex = 0;

      spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, 15, 'teleport');

      // Respawn monsters away from the new player position
      spawnMonsters();
      render();
    }

    function drawMonsters() {
      if (!lamplightEnabled || gameState !== 'playing') return;

      const GLOW_RADIUS = 3;
      for (const m of monsters) {
        const px = m.x * CELL;
        const py = m.y * CELL;

        // Check if monster is within the player's lamplight glow radius
        const dist = Math.abs(m.x - player.x) + Math.abs(m.y - player.y);
        const inGlow = dist <= GLOW_RADIUS;

        if (inGlow) {
          // In lamplight: draw as a soot ball — dark fuzzy circle filling the cell
          const alpha = 1.0 - (dist / (GLOW_RADIUS + 1));
          ctx.fillStyle = 'rgba(50, 40, 35, ' + alpha + ')';
          ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
          // Beady red eyes on top of the soot ball
          ctx.fillStyle = 'rgba(255, 50, 30, ' + alpha + ')';
          ctx.fillRect(px + 2, py + 3, 1, 1);
          ctx.fillRect(px + 5, py + 3, 1, 1);
        } else {
          // In the dark: only beady red eyes visible
          ctx.fillStyle = '#ff3220';
          ctx.fillRect(px + 2, py + 3, 1, 1);
          ctx.fillRect(px + 5, py + 3, 1, 1);
        }
      }
    }

    // === FAIRIES (Lamplight mode only) ===

    function spawnFairies() {
      fairies = [];
      fairyRevealTimer = 0;
      if (!lamplightEnabled) return;
      for (let i = 0; i < 3; i++) {
        let fx, fy;
        do {
          fx = Math.floor(Math.random() * COLS);
          fy = Math.floor(Math.random() * ROWS);
        } while (Math.abs(fx - player.x) + Math.abs(fy - player.y) < 5);
        fairies.push({ x: fx, y: fy, moveTimer: 0 });
      }
    }

    function updateFairies(dt) {
      if (!lamplightEnabled || gameState !== 'playing') return;

      // Tick down the map reveal effect
      if (fairyRevealTimer > 0) {
        fairyRevealTimer = Math.max(0, fairyRevealTimer - dt);
      }

      for (let i = fairies.length - 1; i >= 0; i--) {
        const f = fairies[i];
        f.moveTimer += dt;
        // Fairies drift slower than monsters — ethereal pace
        if (f.moveTimer < 0.6) continue;
        f.moveTimer = 0;

        const dirs = [];
        const cell = grid[f.y][f.x];
        if (!cell.walls.n && f.y > 0) dirs.push([0, -1]);
        if (!cell.walls.s && f.y < ROWS - 1) dirs.push([0, 1]);
        if (!cell.walls.w && f.x > 0) dirs.push([-1, 0]);
        if (!cell.walls.e && f.x < COLS - 1) dirs.push([1, 0]);

        if (dirs.length > 0) {
          const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];
          f.x += dx;
          f.y += dy;
        }

        // Player touches fairy: briefly illuminate the whole map
        if (f.x === player.x && f.y === player.y) {
          fairyRevealTimer = 1.5; // seconds of full illumination
          spawnParticles(f.x * CELL + CELL / 2, f.y * CELL + CELL / 2, 12, 'win');
          fairies.splice(i, 1);
        }
      }
    }

    function drawFairies() {
      if (!lamplightEnabled || gameState !== 'playing') return;

      const GLOW_RADIUS = 3;
      for (const f of fairies) {
        const fpx = f.x * CELL;
        const fpy = f.y * CELL;

        // Soft green glow around the fairy — illuminates nearby walls
        for (let dy = -2; dy <= 2; dy++) {
          for (let dx = -2; dx <= 2; dx++) {
            const gx = f.x + dx;
            const gy = f.y + dy;
            if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) continue;
            const dist = Math.abs(dx) + Math.abs(dy);
            if (dist > 2) continue;
            const alpha = 0.4 * (1.0 - (dist / 3));
            drawCellWalls(gx, gy, alpha);
          }
        }

        // Check if fairy is within the player's lamplight glow radius
        const dist = Math.abs(f.x - player.x) + Math.abs(f.y - player.y);
        const inGlow = dist <= GLOW_RADIUS;

        if (inGlow) {
          // In lamplight: soft glowing sprite body
          const alpha = 1.0 - (dist / (GLOW_RADIUS + 1));
          ctx.fillStyle = 'rgba(150, 255, 150, ' + (alpha * 0.5) + ')';
          ctx.fillRect(fpx + 1, fpy + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = 'rgba(100, 255, 100, ' + alpha + ')';
          ctx.fillRect(fpx + 2, fpy + 3, 1, 1);
          ctx.fillRect(fpx + 5, fpy + 3, 1, 1);
        } else {
          // In the dark: glowing green eyes
          ctx.fillStyle = '#66ff66';
          ctx.fillRect(fpx + 2, fpy + 3, 1, 1);
          ctx.fillRect(fpx + 5, fpy + 3, 1, 1);
        }
      }
    }

    // === GAMEPAD SUPPORT ===
    // Polls the Gamepad API each frame to support D-pad / analog stick input.
    // Works alongside keyboard — both paths call movePlayer(dir) identically.
    // Axes are checked first (covers analog sticks and D-pads-as-axes).
    // Buttons 12-15 cover D-pads on standard gamepad layout.
    // Start/win screens trigger on any button press (rising-edge detected).

    let lastGamepadMove = 0;
    const GAMEPAD_MOVE_DELAY = 150; // ms between moves when held
    let prevGamepadButtons = []; // for rising-edge detection on start/win screens

    function pollGamepad() {
      if (!navigator.getGamepads) return;
      const gamepads = navigator.getGamepads();

      for (let gi = 0; gi < gamepads.length; gi++) {
        const gp = gamepads[gi];
        if (!gp) continue;

        if (!prevGamepadButtons[gi]) prevGamepadButtons[gi] = new Array(gp.buttons.length).fill(false);

        if (gameState === 'start' || gameState === 'win') {
          // Rising-edge any-button → advance screen
          for (let i = 0; i < gp.buttons.length; i++) {
            if (gp.buttons[i].pressed && !prevGamepadButtons[gi][i]) {
              if (gameState === 'start') startGame();
              else playAgain();
              prevGamepadButtons[gi] = Array.from(gp.buttons, b => b.pressed);
              return;
            }
          }
          prevGamepadButtons[gi] = Array.from(gp.buttons, b => b.pressed);
          continue;
        }

        prevGamepadButtons[gi] = Array.from(gp.buttons, b => b.pressed);

        if (gameState !== 'playing') continue;

        const now = performance.now();
        if (now - lastGamepadMove < GAMEPAD_MOVE_DELAY) continue;

        const DEADZONE = 0.5;
        let dir = null;

        // Check all axis pairs (covers both analog sticks and D-pad-as-axes)
        for (let a = 0; a + 1 < gp.axes.length && !dir; a += 2) {
          const ax = gp.axes[a];
          const ay = gp.axes[a + 1];
          if      (ax < -DEADZONE) dir = 'w';
          else if (ax >  DEADZONE) dir = 'e';
          else if (ay < -DEADZONE) dir = 'n';
          else if (ay >  DEADZONE) dir = 's';
        }

        // Standard gamepad D-pad buttons: 12=up 13=down 14=left 15=right
        if (!dir) {
          if      (gp.buttons[12]?.pressed) dir = 'n';
          else if (gp.buttons[13]?.pressed) dir = 's';
          else if (gp.buttons[14]?.pressed) dir = 'w';
          else if (gp.buttons[15]?.pressed) dir = 'e';
        }

        if (dir) {
          lastGamepadMove = now;
          movePlayer(dir);
          return; // one move per poll
        }
      }
    }

    // === GAME LOOP ===

    let lastTime = 0;

    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap delta
      lastTime = timestamp;

      pollGamepad();

      if (gameState === 'playing' || gameState === 'win') {
        updateMonsters(dt);
        updateFairies(dt);
        updateParticles(dt);
        render();
      }

      requestAnimationFrame(gameLoop);
    }

    // === GAME FLOW ===

    function startGame() {
      trailEnabled = document.getElementById('trail-toggle').checked;
      checkpointEnabled = document.getElementById('checkpoint-toggle').checked;
      lamplightEnabled = document.getElementById('lamplight-toggle').checked;

      generateMaze();

      player.x = solutionPath[0][0];
      player.y = solutionPath[0][1];
      player.trail = [];
      player.visitedSet = new Set([player.x + ',' + player.y]);
      player.lastCheckpointIndex = 0;
      buildSolutionSet();
      particles = [];
      checkpointResets = new Map();
      updateScoreboard();
      spawnMonsters();
      spawnFairies();

      gameState = 'playing';
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('help-btn').classList.remove('hidden');

      render();
    }

    function winGame() {
      gameState = 'win';
      // Celebration sparkle burst
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          spawnParticles(
            Math.random() * canvas.width,
            Math.random() * canvas.height,
            15, 'win'
          );
        }, i * 200);
      }
      setTimeout(() => {
        document.getElementById('win-screen').classList.remove('hidden');
      }, 1200);
      document.getElementById('help-btn').classList.add('hidden');
    }

    function playAgain() {
      gameState = 'start';
      particles = [];
      document.getElementById('win-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }

    // Wire up buttons
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('play-again-btn').addEventListener('click', playAgain);

    // === MOBILE D-PAD ===
    // Detect touch capability and show on-screen arrow buttons for phones/tablets.
    // Buttons appear in bottom-left corner only on touch devices.
    const isTouchDevice = () => {
      return (('ontouchstart' in window) ||
              (navigator.maxTouchPoints > 0) ||
              (navigator.msMaxTouchPoints > 0));
    };

    if (isTouchDevice()) {
      document.getElementById('mobile-dpad').classList.remove('hidden');

      // Wire up D-pad buttons
      document.querySelectorAll('.dpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const dir = btn.getAttribute('data-dir');
          movePlayer(dir);
        });
      });
    }

    // Start the game loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
